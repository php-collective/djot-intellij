name: Test Grammar

on:
  push:
    branches: [main]
    paths:
      - 'src/main/resources/textmate/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'src/main/resources/textmate/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: tests

      - name: Run grammar tests
        run: npm test
        working-directory: tests
