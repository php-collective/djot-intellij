name: Test Grammar

on:
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'build.gradle.kts'
  pull_request:
    paths:
      - 'tests/**'
      - 'build.gradle.kts'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Download grammar from djot-grammars
        run: curl -sL https://raw.githubusercontent.com/php-collective/djot-grammars/master/textmate/djot.tmLanguage.json -o src/main/resources/textmate/djot.tmLanguage.json

      - name: Install dependencies
        run: npm ci
        working-directory: tests

      - name: Run grammar tests
        run: npm test
        working-directory: tests
